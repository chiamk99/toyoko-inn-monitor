name: toyoko-inn monitor

on:
  schedule:
    - cron: "*/15 * * * *" # safety net in case the self-restarting loop ever dies
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

concurrency:
  group: toyoko-inn-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Poll every 30 seconds for ~5.5 hours
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          END=$((SECONDS + 20100))
          while [ $SECONDS -lt $END ]; do
            python check.py || true
            if ! git diff --quiet -- state.json; then
              git add state.json
              git commit -m "Update state.json" -q
              git pull --rebase -q || true
              git push -q || true
            fi
            sleep 30
          done

      - name: Re-trigger next loop
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run monitor.yml --repo ${{ github.repository }}
